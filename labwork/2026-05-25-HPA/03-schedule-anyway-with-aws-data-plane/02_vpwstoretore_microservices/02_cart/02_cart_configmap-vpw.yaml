apiVersion: v1
kind: ConfigMap
metadata:
  name: carts-vpw
data:
  RETAIL_CART_PERSISTENCE_PROVIDER: dynamodb
  RETAIL_CART_PERSISTENCE_DYNAMODB_TABLE_NAME: Items-vpw
  RETAIL_CART_PERSISTENCE_DYNAMODB_CREATE_TABLE: "true"
  RETAIL_CART_PERSISTENCE_DYNAMODB_ENDPOINT: https://dynamodb.ap-south-1.amazonaws.com
  AWS_REGION: ap-south-1
  AWS_DEFAULT_REGION: ap-south-1



