apiVersion: v1
kind: Pod
metadata:
  name: orders-sqs-client-vpw
  namespace: default
spec:
  serviceAccountName: orders-vpw
  containers:
  - name: aws-cli-vpw
    image: amazon/aws-cli
    command: ["/bin/sh"]
    args: ["-c", "sleep infinity"]

    env:
      - name: AWS_REGION
        value: ap-south-1

      # Fetch queue name from ConfigMap
      - name: SQS_QUEUE_NAME
        valueFrom:
          configMapKeyRef:
            name: orders-vpw
            key: RETAIL_ORDERS_MESSAGING_SQS_TOPIC
  restartPolicy: Never
