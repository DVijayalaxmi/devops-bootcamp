apiVersion: apps/v1
kind: Deployment
metadata:
  name: catalog-vpw
  labels:
    app.kubernetes.io/name: catalog-vpw
    app.kubernetes.io/instance: catalog-vpw
    app.kubernetes.io/component: service-vpw
    app.kubernetes.io/owner: retail-store-sample-vpw
spec:
  replicas: 1
  strategy:
    rollingUpdate:
      maxUnavailable: 1
    type: RollingUpdate
  selector:
    matchLabels:
      app.kubernetes.io/name: catalog-vpw
      app.kubernetes.io/instance: catalog-vpw
      app.kubernetes.io/component: service-vpw
      app.kubernetes.io/owner: retail-store-sample-vpw
  template:
    metadata:
      labels:
        app.kubernetes.io/name: catalog-vpw
        app.kubernetes.io/instance: catalog-vpw
        app.kubernetes.io/component: service-vpw
        app.kubernetes.io/owner: retail-store-sample-vpw
    spec:
      serviceAccount: catalog-mysql-sa-vpw # Service Account
      securityContext:
        fsGroup: 1000
      containers:
        - name: catalog-vpw
          envFrom:
            - configMapRef:
                name: catalog-vpw
          securityContext:
            capabilities:
              drop:
              - ALL
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 1000
          image: "public.ecr.aws/aws-containers/retail-store-sample-catalog:1.3.0"
          imagePullPolicy: IfNotPresent
          ports:
            - name: http-vpw
              containerPort: 8080
              protocol: TCP
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
          livenessProbe:
            httpGet:
              path: /health
              port: 8080                 
          resources:
            limits:
              cpu: 200m
              memory: 256Mi
            requests:
              cpu: 100m
              memory: 256Mi

          volumeMounts:
            - name: aws-secrets-vpw
              mountPath: /mnt/secrets-store-vpw
              readOnly: true
          command: ["/bin/bash", "-c"]
          args:
            - |
              export RETAIL_CATALOG_PERSISTENCE_USER=$(cat /mnt/secrets-store-vpw/MYSQL_USER);
              export RETAIL_CATALOG_PERSISTENCE_PASSWORD=$(cat /mnt/secrets-store-vpw/MYSQL_PASSWORD);
              echo "Starting Catalog service with secure DB credentials";
              exec /app/main
      volumes:
        - name: aws-secrets-vpw
          csi:
            driver: secrets-store.csi.k8s.io
            readOnly: true
            volumeAttributes:
              secretProviderClass: "catalog-db-secrets-vpw"