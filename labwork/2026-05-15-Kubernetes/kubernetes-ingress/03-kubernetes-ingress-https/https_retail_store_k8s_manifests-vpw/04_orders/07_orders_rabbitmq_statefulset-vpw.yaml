# Source: retail-store-sample-orders-chart/templates/rabbitmq-statefulset.yaml
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: orders-rabbitmq-vpw
  labels:
    helm.sh/chart: orders-1.2.4
    app.kubernetes.io/name: orders-vpw
    app.kubernetes.io/instance: orders-vpw
    app.kubernetes.io/component: rabbitmq-vpw
    app.kubernetes.io/owner: retail-store-sample-vpw
    app.kubernetes.io/managed-by: Helm
spec:
  replicas: 1
  serviceName: orders-rabbitmq-vpw
  selector:
    matchLabels:
      app.kubernetes.io/name: orders-vpw
      app.kubernetes.io/instance: orders-vpw
      app.kubernetes.io/component: rabbitmq-vpw
      app.kubernetes.io/owner: retail-store-sample-vpw
  template:
    metadata:
      labels:
        app.kubernetes.io/name: orders-vpw
        app.kubernetes.io/instance: orders-vpw
        app.kubernetes.io/component: rabbitmq-vpw
        app.kubernetes.io/owner: retail-store-sample-vpw
    spec:
      containers:
        - name: rabbitmq-vpw
          image: "public.ecr.aws/docker/library/rabbitmq:3-management"
          imagePullPolicy: IfNotPresent
          ports:
          - name: amqp-vpw
            containerPort: 5672
            protocol: TCP
          - name: http-vpw
            containerPort: 15672
            protocol: TCP
          volumeMounts:
          - name: data-vpw
            mountPath: "/var/lib/rabbitmq/mnesia"
      volumes:
      - name: data-vpw
        emptyDir: {}