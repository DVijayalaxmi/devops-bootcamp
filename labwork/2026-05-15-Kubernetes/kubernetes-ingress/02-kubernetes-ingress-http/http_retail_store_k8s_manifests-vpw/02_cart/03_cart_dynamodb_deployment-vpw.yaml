# Source: retail-store-sample-cart-chart/templates/dynamodb-deployment.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: carts-dynamodb-vpw
  labels:
    helm.sh/chart: carts-1.2.4
    app.kubernetes.io/name: carts-vpw
    app.kubernetes.io/instance: carts-vpw
    app.kubernetes.io/component: dynamodb-vpw
    app.kubernetes.io/owner: retail-store-sample-vpw
    app.kubernetes.io/managed-by: Helm
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: carts-vpw
      app.kubernetes.io/instance: carts-vpw
      app.kubernetes.io/component: dynamodb-vpw
      app.kubernetes.io/owner: retail-store-sample-vpw
  template:
    metadata:
      labels:
        app.kubernetes.io/name: carts-vpw
        app.kubernetes.io/instance: carts-vpw
        app.kubernetes.io/component: dynamodb-vpw
        app.kubernetes.io/owner: retail-store-sample-vpw
    spec:
      containers:
        - name: dynamodb-vpw
          image: "public.ecr.aws/aws-dynamodb-local/aws-dynamodb-local:1.25.1"
          imagePullPolicy: IfNotPresent
          ports:
            - name: dynamodb-vpw
              containerPort: 8000
              protocol: TCP
