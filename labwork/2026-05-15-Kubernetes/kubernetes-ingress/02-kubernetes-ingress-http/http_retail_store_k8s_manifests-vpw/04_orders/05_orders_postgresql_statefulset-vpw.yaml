# Source: retail-store-sample-orders-chart/templates/postgresql-statefulset.yaml
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: orders-postgresql-vpw
  labels:
    helm.sh/chart: orders-1.2.4
    app.kubernetes.io/name: orders-vpw
    app.kubernetes.io/instance: orders-vpw
    app.kubernetes.io/component: postgresql-vpw
    app.kubernetes.io/owner: retail-store-sample-vpw
    app.kubernetes.io/managed-by: Helm
spec:
  replicas: 1
  serviceName: orders-postgresql-vpw
  selector:
    matchLabels:
      app.kubernetes.io/name: orders-vpw
      app.kubernetes.io/instance: orders-vpw
      app.kubernetes.io/component: postgresql-vpw
      app.kubernetes.io/owner: retail-store-sample-vpw
  template:
    metadata:
      labels:
        app.kubernetes.io/name: orders-vpw
        app.kubernetes.io/instance: orders-vpw
        app.kubernetes.io/component: postgresql-vpw
        app.kubernetes.io/owner: retail-store-sample-vpw
    spec:
      containers:
        - name: postgresql-vpw
          image: "public.ecr.aws/docker/library/postgres:16.1"
          imagePullPolicy: IfNotPresent
          env:
            - name: POSTGRES_DB
              value: orders-vpw
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: orders-db-vpw
                  key: RETAIL_ORDERS_PERSISTENCE_USERNAME
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: orders-db-vpw
                  key: RETAIL_ORDERS_PERSISTENCE_PASSWORD
            - name: PGDATA
              value: /data/pgdata
          volumeMounts:
            - name: data-vpw
              mountPath: /data
          ports:
            - name: postgresql-vpw
              containerPort: 5432
              protocol: TCP
      volumes:
      - name: data-vpw
        emptyDir: {}
