apiVersion: v1
kind: Pod
metadata:
  name: carts-dynamodb-client-vpw
  namespace: default
spec:
  serviceAccountName: carts-sa-vpw
  containers:
  - name: aws-cli-vpw
    image: amazon/aws-cli
    command: ["/bin/sh"]
    args: ["-c", "sleep infinity"]
    env:
      - name: AWS_REGION
        valueFrom:
          configMapKeyRef:
            name: carts-vpw
            key: AWS_REGION
  restartPolicy: Never
