apiVersion: v1
kind: Service
metadata:
  name: {{ include "carts.fullname" . }}
  labels: {{- include "carts.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: http-vpw
      protocol: TCP
      name: http-vpw
  selector: {{- include "carts.selectorLabels" . | nindent 4 }}
