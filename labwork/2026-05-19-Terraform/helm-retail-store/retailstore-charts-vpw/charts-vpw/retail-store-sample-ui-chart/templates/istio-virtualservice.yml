{{- if .Values.istio.enabled }}
apiVersion: networking.istio.io/v1alpha3
kind: VirtualService
metadata:
  name: ui-vpw
spec:
  hosts:
  - "*"
  gateways:
  - retail-store-sample-vpw
  http:
  - match:
    - uri:
        prefix: /
    route:
    - destination:
        host: ui-vpw
        port:
          number: 80
{{- end }}